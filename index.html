<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #006a4e, #4f42a1);
    }

    .register-box {
      background: #ffffff;
      padding: 30px;
      width: 100%;
      max-width: 380px;
      border-radius: 12px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }

    .register-box h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    .register-box input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    .register-box input:focus {
      outline: none;
      border-color: #006a4e;
    }

    .register-box button {
      width: 100%;
      padding: 12px;
      background: #006a4e;
      border: none;
      color: #fff;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
    }

    .register-box button:hover {
      background: #00543e;
    }

    .footer-text {
      text-align: center;
      margin-top: 15px;
      font-size: 13px;
      color: #777;
    }
  </style>
</head>

<body>

  <div class="register-box">
    <h2>Create Account</h2>

    <form>
      <input type="text" placeholder="Full Name" required>
      <input type="tel" placeholder="Phone Number" required>
      <input type="password" placeholder="Password" required>
      <input type="password" placeholder="Confirm Password" required>

      <button type="submit">Register</button>
    </form>

    <div class="footer-text">
      Already have an account? Login
    </div>
  </div>

</body>
</html>
