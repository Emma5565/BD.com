<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #006a4e, #4f42a1);
    }
    .register-box {
      background: #fff;
      padding: 30px;
      width: 100%;
      max-width: 380px;
      border-radius: 12px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    .register-box h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #006a4e;
    }
    .form-group {
      margin-bottom: 15px;
    }
    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: bold;
    }
    .form-group input {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }
    .btn {
      width: 100%;
      padding: 12px;
      background: #006a4e;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
    .btn:hover {
      background: #00563f;
    }
    .footer-text {
      text-align: center;
      margin-top: 15px;
      font-size: 13px;
      color: #666;
    }
  </style>
</head>

<body>

  <div class="register-box">
    <h2>Create Account</h2>

    <form>
      <div class="form-group">
        <label>Name</label>
        <input type="text" placeholder="Enter your name" required>
      </div>

      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" placeholder="Enter phone number" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" placeholder="Enter password" required>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" placeholder="Confirm password" required>
      </div>

      <button class="btn" type="submit">Register</button>
    </form>

    <div class="footer-text">
      Already have an account? Login
    </div>
  </div>

</body>
</html>
